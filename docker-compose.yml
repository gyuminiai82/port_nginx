services:
  nginx:
    image: nginx:alpine
    container_name: port_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./html:/usr/share/nginx/html:ro
      - ./logs:/var/log/nginx
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - proxy-network

  redis-session:
    image: redis:alpine
    container_name: port_redis_session
    command: redis-server --appendonly yes --requirepass "03040228"
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    restart: always
    networks:
      - proxy-network

  postgres-db:
    image: postgis/postgis:15-3.4-alpine
    container_name: port_postgres_db
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: gyumin
      POSTGRES_PASSWORD: "03040228"
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: always
    networks:
      - proxy-network

  certbot:
    image: certbot/certbot
    container_name: port_certbot
    restart: always
    volumes:
      - ./ssl:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - proxy-network

  ollama:
    image: ollama/ollama:latest
    container_name: port_ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama-data:/root/.ollama
    restart: always
    networks:
      - proxy-network

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: port_open_webui
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    ports:
      - "3000:8080"
    volumes:
      - ./open-webui-data:/app/backend/data
    restart: always
    networks:
      - proxy-network
    depends_on:
      - ollama

  chromadb:
    image: chromadb/chroma:latest
    container_name: port_chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./chroma-data:/chroma/chroma
    restart: always
    networks:
      - proxy-network

networks:
  proxy-network:
    name: proxy-network
    driver: bridge
