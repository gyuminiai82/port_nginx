services:
  nginx:
    image: nginx:alpine
    container_name: port_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./html:/usr/share/nginx/html:ro
      - ./logs:/var/log/nginx
    restart: always
    networks:
      - proxy-network

  redis-session:
    image: redis:alpine
    container_name: port_redis_session
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    restart: always
    networks:
      - proxy-network

  postgres-db:
    image: postgres:15-alpine
    container_name: port_postgres_db
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: gyumin
      POSTGRES_PASSWORD: "03040228"
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: always
    networks:
      - proxy-network

  certbot:
    image: certbot/certbot
    container_name: port_certbot
    restart: always
    volumes:
      - ./ssl:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - proxy-network

networks:
  proxy-network:
    name: proxy-network
    driver: bridge
