services:
  nginx:
    image: nginx:alpine
    container_name: port_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./html:/usr/share/nginx/html:ro
      - ./logs:/var/log/nginx
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - proxy-network

  redis-session:
    image: redis:alpine
    container_name: port_redis_session
    command: redis-server --appendonly yes --requirepass "03040228"
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    restart: always
    networks:
      - proxy-network

  postgres-db:
    build: 
      context: ./postgres
      dockerfile: Dockerfile
    container_name: port_postgres_db
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: gyumin
      POSTGRES_PASSWORD: "03040228"
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: always
    networks:
      - proxy-network

  certbot:
    image: certbot/certbot
    container_name: port_certbot
    restart: always
    volumes:
      - ./ssl:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - proxy-network

  ollama:
    image: ollama/ollama:latest
    container_name: port_ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama-data:/root/.ollama
    restart: always
    networks:
      - proxy-network

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: port_open_webui
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    ports:
      - "3002:8080"
    volumes:
      - ./open-webui-data:/app/backend/data
    restart: always
    networks:
      - proxy-network
    depends_on:
      - ollama

  chromadb:
    image: chromadb/chroma:latest
    container_name: port_chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./chroma-data:/chroma/chroma
    restart: always
    networks:
      - proxy-network

  port_node_red:
    image: nodered/node-red:latest
    container_name: port_node_red
    volumes:
      - nodered_data:/data
    restart: always
    networks:
      - proxy-network

  port_emqx:
    image: emqx/emqx:latest
    container_name: port_emqx
    restart: always
    networks:
      - proxy-network

  port_kafka:
    image: bitnamilegacy/kafka:latest
    container_name: port_kafka
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@port_kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://port_kafka:9092
    volumes:
      - kafka_data:/bitnami/kafka
    restart: always
    networks:
      - proxy-network

  port_mqtt_to_kafka:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    container_name: port_mqtt_to_kafka
    command: python mqtt_to_kafka.py
    environment:
      - MQTT_BROKER=port_emqx
      - KAFKA_BROKER=port_kafka:9092
    restart: always
    depends_on:
      - port_emqx
      - port_kafka
    networks:
      - proxy-network

  port_kafka_to_postgres:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    container_name: port_kafka_to_postgres
    command: python kafka_to_postgres.py
    environment:
      - KAFKA_BROKER=port_kafka:9092
      - DB_HOST=port_postgres_db
      - DB_USER=gyumin
      - DB_PASS=03040228
      - DB_NAME=portfolio
    restart: always
    depends_on:
      - port_kafka
      - postgres-db
    networks:
      - proxy-network

  port_grafana:
    image: grafana/grafana:latest
    container_name: port_grafana
    volumes:
      - grafana_data:/var/lib/grafana
    restart: always
    networks:
      - proxy-network

networks:
  proxy-network:
    name: proxy-network
    driver: bridge

volumes:
  nodered_data:
  kafka_data:
  grafana_data:
