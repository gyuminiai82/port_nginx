name: Deploy to Live Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            set -e
            echo "Starting Deployment..."
            
            # Ensure the target directory exists
            mkdir -p /home/${{ secrets.SERVER_USER }}/port_nginx
            cd /home/${{ secrets.SERVER_USER }}/port_nginx
            
            # Since this is an initial clone or update, we check if git is initialized
            if [ ! -d ".git" ]; then
              echo "Initializing Git repository..."
              git clone https://github.com/${{ github.repository }}.git .
            else
              echo "Pulling latest code from main branch..."
              git fetch origin main
              git reset --hard origin/main
            fi
            
            # Start/Update Docker containers (this starts Nginx with HTTP config first)
            echo "Restarting Docker containers..."
            docker compose up -d --build
            
            echo "Waiting for postgres to initialize..."
            sleep 10
            docker exec port_postgres_db psql -U gyumin -d portfolio -c "CREATE DATABASE \"PORT_AUTH\";" || true
            docker exec port_postgres_db psql -U gyumin -d portfolio -c "CREATE DATABASE \"PORT_SHOP\";" || true
            docker exec port_postgres_db psql -U gyumin -d portfolio -c "ALTER USER gyumin WITH PASSWORD '03040228';" || true
            
            # Temporary: Reset sensor_data table and restart data pipelines
            # echo "Resetting sensor_data table and restarting pipelines..."
            # docker exec port_postgres_db psql -U gyumin -d portfolio -c "DROP TABLE IF EXISTS sensor_data CASCADE;" || true
            # docker exec -i port_postgres_db psql -U gyumin -d portfolio < ./postgres/init.sql || true
            # docker restart port_mqtt_to_kafka port_kafka_to_postgres || true
            
            # Pull Qwen 2.5 VL (3B) model into Ollama
            echo "Pulling Qwen 2.5 VL (3B) model..."
            docker exec port_ollama ollama pull qwen2.5vl:3b
            
            # Request SSL Certificate using Certbot (only if it doesn't exist)
            echo "Requesting SSL Certificate..."
            docker exec port_certbot certbot certonly --webroot --webroot-path /var/www/certbot/ -d auth.minstudio.app -m blackksj@naver.com --agree-tos --no-eff-email --keep-until-expiring
            docker exec port_certbot certbot certonly --webroot --webroot-path /var/www/certbot/ -d shop.minstudio.app -m blackksj@naver.com --agree-tos --no-eff-email --keep-until-expiring
            docker exec port_certbot certbot certonly --webroot --webroot-path /var/www/certbot/ -d chatbot.minstudio.app -m blackksj@naver.com --agree-tos --no-eff-email --keep-until-expiring
            docker exec port_certbot certbot certonly --webroot --webroot-path /var/www/certbot/ -d nodered.minstudio.app -m blackksj@naver.com --agree-tos --no-eff-email --keep-until-expiring
            docker exec port_certbot certbot certonly --webroot --webroot-path /var/www/certbot/ -d emqx.minstudio.app -m blackksj@naver.com --agree-tos --no-eff-email --keep-until-expiring
            docker exec port_certbot certbot certonly --webroot --webroot-path /var/www/certbot/ -d grafana.minstudio.app -m blackksj@naver.com --agree-tos --no-eff-email --keep-until-expiring
            
            # Apply HTTPS configuration
            echo "Applying HTTPS configuration..."
            cp nginx/conf.d/auth.minstudio.app.https.conf nginx/conf.d/auth.minstudio.app.conf
            cp nginx/conf.d/shop.minstudio.app.https.conf nginx/conf.d/shop.minstudio.app.conf
            cp nginx/conf.d/chatbot.minstudio.app.https.conf nginx/conf.d/chatbot.minstudio.app.conf
            cp nginx/conf.d/nodered.minstudio.app.https.conf nginx/conf.d/nodered.minstudio.app.conf
            cp nginx/conf.d/emqx.minstudio.app.https.conf nginx/conf.d/emqx.minstudio.app.conf
            cp nginx/conf.d/grafana.minstudio.app.https.conf nginx/conf.d/grafana.minstudio.app.conf
            
            # Reload Nginx to apply new certificates and HTTPS block
            docker exec port_nginx nginx -s reload
            
            echo "Deployment Completed!"
