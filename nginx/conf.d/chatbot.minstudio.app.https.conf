server {
    listen 443 ssl;
    server_name chatbot.minstudio.app;

    # Let's Encrypt 챌린지를 위한 경로
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 임시 인증서 (실제 인증서 발급 전까지 Nginx 시작을 위해)
    # ssl_certificate /etc/letsencrypt/cert.pem;
    # ssl_certificate_key /etc/letsencrypt/key.pem;
    ssl_certificate /etc/letsencrypt/live/chatbot.minstudio.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chatbot.minstudio.app/privkey.pem;

    # SSL/TLS 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $upstream http://host.docker.internal:3003;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
