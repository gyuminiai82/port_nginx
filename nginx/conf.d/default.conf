# HTTP 기본 서버 블록 (포트 80)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _; 

    # 등록되지 않은 주소로 오면 커스텀 404 페이지 띄우기
    error_page 404 /404.html;

    location / {
        return 404;
    }

    location = /404.html {
        root   /usr/share/nginx/html;
        internal;
    }
}

# HTTPS 기본 서버 블록 (포트 443)
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _; 

    # 로컬/임시 인증서 (기본적으로 Nginx가 시작하려면 인증서가 필요함)
    ssl_certificate /etc/letsencrypt/cert.pem;
    ssl_certificate_key /etc/letsencrypt/key.pem;

    # 보안: 등록되지 않은 서브도메인(예: eqmx 등)으로 https 접근 시 
    # 아예 연결을 거부할 수도 있으나, 안내 페이지를 띄우려면 아래 404 설정 유지
    error_page 404 /404.html;

    location / {
        return 404;
    }

    location = /404.html {
        root   /usr/share/nginx/html;
        internal;
    }
}
